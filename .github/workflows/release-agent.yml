# Publishes the Revealyst Agent CLI to npm (manual dispatch only — mirrors
# deploy.yml's founder-triggered shape). Publishes the canonical scoped
# package first, then the unscoped alias that keeps `npx revealyst-agent`
# working and the name un-squattable (plan R7: CI-only release, provenance,
# version-pinned copy).
#
# Founder prerequisites (docs/manual-sync-plan.md §8): NPM_TOKEN repo
# secret (npm automation/granular token; account has 2FA), and the
# `revealyst` npm org must exist for the @revealyst scope.

name: Release Agent

on:
  workflow_dispatch:
    inputs:
      publish-alias:
        description: "Also publish the unscoped revealyst-agent alias"
        type: boolean
        default: true

permissions:
  # npm --provenance signs via GitHub OIDC; requires id-token: write and a
  # public repo.
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          # Writes the .npmrc that npm publish authenticates through
          # (NODE_AUTH_TOKEN below).
          registry-url: "https://registry.npmjs.org"
      - name: Require NPM_TOKEN
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN repo secret is not set — founder action, see docs/manual-sync-plan.md §8"
            exit 1
          fi
      - run: npm ci
      - name: Build the agent
        run: npx tsc -p packages/revealyst-agent/tsconfig.build.json
      - name: Run the agent test suites
        run: npx vitest run packages/revealyst-agent/tests tests/agent-cli-contract.test.ts
      - name: Publish @revealyst/agent
        working-directory: packages/revealyst-agent
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
      - name: Publish unscoped alias (revealyst-agent)
        if: ${{ inputs.publish-alias }}
        working-directory: packages/revealyst-agent-alias
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
