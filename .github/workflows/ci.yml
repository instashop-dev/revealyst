name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Build first: cloudflare-env.d.ts references the built worker module,
      # so typecheck needs .open-next to exist.
      - name: Build Workers bundle
        run: npx opennextjs-cloudflare build
      - run: npm run typecheck
      # Tenancy guard (D1b): raw table access outside src/db/** fails CI —
      # the mechanical form of CLAUDE.md's review-blocker rule.
      - name: Org-scope guard
        run: node scripts/check-org-scope.mjs
      # Contract + isolation tests run inside the suite (tests/contracts,
      # tests/tenant-isolation) — the failing-on-drift hook W1-S inherits.
      - run: npm test

  frozen-contracts:
    # Rule 1: post-freeze changes to frozen contracts require an ADR. This
    # blocks any PR that touches a frozen path without a docs/decisions/
    # change in the same PR. Active from the contracts-v1 freeze onward.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require an ADR for frozen-contract changes
        run: |
          # Fetch the base branch WITHOUT --depth=1: a shallow tip has no
          # ancestors, so `git merge-base` can't resolve the fork point when the
          # base has advanced past where this PR branched — it errexits the job
          # with a misleading "frozen" failure. Full base history (checkout is
          # already fetch-depth: 0) makes merge-base reliable.
          git fetch origin "${{ github.base_ref }}"
          base=$(git merge-base "origin/${{ github.base_ref }}" HEAD)
          changed=$(git diff --name-only "$base" HEAD)
          # fixtures/: ADDING files is fine (new coverage); modifying or
          # deleting existing shapes is a contract change.
          modified=$(git diff --name-only --diff-filter=MDR "$base" HEAD)
          frozen=$(printf '%s\n' "$changed" | grep -E '^(src/contracts/|src/db/schema\.ts$|src/db/org-scope\.ts$|src/lib/credentials\.ts$|drizzle/|docs/connector-facts\.md$)' || true)
          frozen_fixtures=$(printf '%s\n' "$modified" | grep -E '^fixtures/' || true)
          all_frozen=$(printf '%s\n%s\n' "$frozen" "$frozen_fixtures" | grep -v '^$' || true)
          if [ -n "$all_frozen" ]; then
            if ! printf '%s\n' "$changed" | grep -q '^docs/decisions/'; then
              echo "::error::Frozen contract paths changed without an ADR in docs/decisions/ (CLAUDE.md rule 1):"
              printf '%s\n' "$all_frozen"
              exit 1
            fi
          fi
          echo "frozen-contracts guard: ok"

  preview-deploy:
    # Uploads a new Worker version (not deployed to the live route) and
    # surfaces its preview URL. Skips gracefully until the founder adds the
    # Cloudflare secrets — forks and pre-credential PRs still get CI green.
    if: github.event_name == 'pull_request'
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Check Cloudflare credentials
        id: creds
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLOUDFLARE_API_TOKEN not set — skipping preview deploy"
          fi
      - if: steps.creds.outputs.available == 'true'
        run: npm ci
      - if: steps.creds.outputs.available == 'true'
        run: npx opennextjs-cloudflare build
      - name: Populate incremental cache assets
        # The static-assets incremental cache (open-next.config.ts) is
        # populated by `opennextjs-cloudflare deploy` in production (a local
        # copy of .open-next/cache into assets/cdn-cgi/_next_cache), but this
        # job uploads with raw `wrangler versions upload`, which skips that
        # step — previews would then MISS cache interception on every
        # prerendered page (full render instead of the cached HTML) and spam
        # error-level "Failed to set to read-only cache" logs on each such
        # request. For the static-assets flavor this command is a pure local
        # file copy — no remote writes.
        if: steps.creds.outputs.available == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx opennextjs-cloudflare populateCache remote
      - name: Ensure poll queues exist
        # The consumer config references revealyst-poll-dlq as a
        # dead_letter_queue; `wrangler versions upload` errors if the queue
        # doesn't exist. Create both (idempotent) before uploading — mirrors
        # the Deploy workflow.
        if: steps.creds.outputs.available == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler queues create revealyst-poll || echo "revealyst-poll create skipped (may already exist)"
          npx wrangler queues create revealyst-poll-dlq || echo "revealyst-poll-dlq create skipped (may already exist)"
      - name: Upload preview version
        if: steps.creds.outputs.available == 'true'
        id: upload
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          if ! npx wrangler versions upload --message "PR #${{ github.event.pull_request.number }}" 2>&1 | tee upload.log; then
            if grep -q "does not yet exist" upload.log; then
              echo "::notice::Worker not deployed yet — preview upload skipped (run the Deploy workflow once first)"
              exit 0
            fi
            exit 1
          fi
          url=$(grep -oE 'https://[a-z0-9-]+\.[a-z0-9-]+\.workers\.dev' upload.log | head -1 || true)
          echo "url=$url" >> "$GITHUB_OUTPUT"
      - name: Comment preview URL
        if: steps.creds.outputs.available == 'true' && steps.upload.outputs.url != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "🔍 Preview version: ${{ steps.upload.outputs.url }}" \
            --edit-last --create-if-none
