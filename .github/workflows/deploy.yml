name: Deploy

# Manual production deploy (founder-triggered from the Actions tab or
# `gh workflow run deploy.yml`). Uses repo secrets — no local Cloudflare
# credentials required. Wire to push-on-main once W0 is gated.
on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "skip migrations (DATABASE_URL repo secret not set)"
          else
            npx drizzle-kit migrate
          fi

      - name: Ensure poll queue exists
        # Errors if it already exists — masked, because a genuinely missing
        # queue fails the deploy step right after with a clearer message.
        run: npx wrangler queues create revealyst-poll || echo "queue create skipped (may already exist)"

      - name: Build and deploy
        run: npm run deploy

      - name: Sync Worker secrets from repo secrets
        # After deploy: `wrangler secret put` needs the Worker to exist, and
        # updating a secret redeploys the latest version with it applied.
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          GH_OAUTH_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
          GH_OAUTH_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
        run: |
          put() {
            if [ -n "$2" ]; then
              printf '%s' "$2" | npx wrangler secret put "$1"
            else
              echo "skip $1 (repo secret not set)"
            fi
          }
          put DATABASE_URL "$DATABASE_URL"
          put BETTER_AUTH_SECRET "$BETTER_AUTH_SECRET"
          put BETTER_AUTH_URL "$BETTER_AUTH_URL"
          put GITHUB_CLIENT_ID "$GH_OAUTH_CLIENT_ID"
          put GITHUB_CLIENT_SECRET "$GH_OAUTH_CLIENT_SECRET"
