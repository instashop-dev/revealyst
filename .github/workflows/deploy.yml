name: Deploy

# Manual production deploy (founder-triggered from the Actions tab or
# `gh workflow run deploy.yml`). Uses repo secrets — no local Cloudflare
# credentials required. Wire to push-on-main once W0 is gated.
on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "skip migrations (DATABASE_URL repo secret not set)"
          else
            npx drizzle-kit migrate
          fi

      - name: Ensure poll queues exist
        # Errors if they already exist — masked, because a genuinely missing
        # queue fails the deploy step right after with a clearer message. The
        # DLQ must exist before deploy since the consumer config references it
        # as dead_letter_queue (wrangler.jsonc).
        run: |
          npx wrangler queues create revealyst-poll || echo "revealyst-poll create skipped (may already exist)"
          npx wrangler queues create revealyst-poll-dlq || echo "revealyst-poll-dlq create skipped (may already exist)"

      - name: Build and deploy
        run: npm run deploy

      - name: Sync Worker secrets from repo secrets
        # After deploy: `wrangler secret put` needs the Worker to exist, and
        # updating a secret redeploys the latest version with it applied.
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          GH_OAUTH_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
          GH_OAUTH_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
          CREDENTIAL_KEK_CURRENT: ${{ secrets.CREDENTIAL_KEK_CURRENT }}
          CREDENTIAL_KEK_PREVIOUS: ${{ secrets.CREDENTIAL_KEK_PREVIOUS }}
          PADDLE_ENVIRONMENT: ${{ secrets.PADDLE_ENVIRONMENT }}
          PADDLE_API_KEY: ${{ secrets.PADDLE_API_KEY }}
          PADDLE_CLIENT_TOKEN: ${{ secrets.PADDLE_CLIENT_TOKEN }}
          PADDLE_PRICE_ID: ${{ secrets.PADDLE_PRICE_ID }}
          PADDLE_DISCOUNT_ID: ${{ secrets.PADDLE_DISCOUNT_ID }}
          PADDLE_WEBHOOK_SECRET: ${{ secrets.PADDLE_WEBHOOK_SECRET }}
          PADDLE_WEBHOOK_SECRET_SANDBOX: ${{ secrets.PADDLE_WEBHOOK_SECRET_SANDBOX }}
          ADMIN_USER_IDS: ${{ secrets.ADMIN_USER_IDS }}
          SES_ACCESS_KEY_ID: ${{ secrets.SES_ACCESS_KEY_ID }}
          SES_SECRET_ACCESS_KEY: ${{ secrets.SES_SECRET_ACCESS_KEY }}
          SES_REGION: ${{ secrets.SES_REGION }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          DESKTOP_CONFIG_SIGNING_KEY: ${{ secrets.DESKTOP_CONFIG_SIGNING_KEY }}
        run: |
          put() {
            if [ -n "$2" ]; then
              printf '%s' "$2" | npx wrangler secret put "$1"
            else
              echo "skip $1 (repo secret not set)"
            fi
          }
          put DATABASE_URL "$DATABASE_URL"
          put BETTER_AUTH_SECRET "$BETTER_AUTH_SECRET"
          put BETTER_AUTH_URL "$BETTER_AUTH_URL"
          put GITHUB_CLIENT_ID "$GH_OAUTH_CLIENT_ID"
          put GITHUB_CLIENT_SECRET "$GH_OAUTH_CLIENT_SECRET"
          put CREDENTIAL_KEK_CURRENT "$CREDENTIAL_KEK_CURRENT"
          # W3-M billing: without these, checkout 500s and the Paddle webhook
          # rejects every event ("webhook secret not configured") — found at
          # the W3 gate check. Values are per-environment (prod, not sandbox).
          put PADDLE_ENVIRONMENT "$PADDLE_ENVIRONMENT"
          put PADDLE_API_KEY "$PADDLE_API_KEY"
          put PADDLE_CLIENT_TOKEN "$PADDLE_CLIENT_TOKEN"
          put PADDLE_PRICE_ID "$PADDLE_PRICE_ID"
          put PADDLE_DISCOUNT_ID "$PADDLE_DISCOUNT_ID"
          put PADDLE_WEBHOOK_SECRET "$PADDLE_WEBHOOK_SECRET"
          put PADDLE_WEBHOOK_SECRET_SANDBOX "$PADDLE_WEBHOOK_SECRET_SANDBOX"
          # Platform-admin bootstrap (ADR 0016): comma-separated Better Auth
          # user ids granted /admin access without the user.role column being
          # set. Unset/empty = no platform admins; the admin section is inert.
          put ADMIN_USER_IDS "$ADMIN_USER_IDS"
          # SES transactional email (account mgmt): password reset + signup
          # email verification. Without these, sendEmail() no-ops (no mail
          # sent) and — with requireEmailVerification — new signups can't
          # confirm their address. EMAIL_FROM must be an SES-verified identity,
          # and the SES account must be out of the sandbox to reach real users.
          put SES_ACCESS_KEY_ID "$SES_ACCESS_KEY_ID"
          put SES_SECRET_ACCESS_KEY "$SES_SECRET_ACCESS_KEY"
          put SES_REGION "$SES_REGION"
          put EMAIL_FROM "$EMAIL_FROM"
          # Desktop-agent signed remote config (T4.2): Ed25519 private key
          # (v<N>:<base64 pkcs8>) that signs GET /api/desktop/config. The
          # matching public key is baked into the agent at build time. Distinct
          # from the credential KEK. Generated OFFLINE and never exposed to PR
          # workflows (spec §29). Unset = /api/desktop/config 500s (no key).
          put DESKTOP_CONFIG_SIGNING_KEY "$DESKTOP_CONFIG_SIGNING_KEY"
          # PREVIOUS exists only during a rotation window: when the repo
          # secret is removed, delete it from the Worker too — otherwise the
          # retired KEK could decrypt not-yet-rewrapped rows forever.
          if [ -n "$CREDENTIAL_KEK_PREVIOUS" ]; then
            put CREDENTIAL_KEK_PREVIOUS "$CREDENTIAL_KEK_PREVIOUS"
          else
            printf 'y\n' | npx wrangler secret delete CREDENTIAL_KEK_PREVIOUS || echo "CREDENTIAL_KEK_PREVIOUS not present on Worker (nothing to delete)"
          fi
