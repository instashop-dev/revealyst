<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- BrandMark (src/components/brand-mark.tsx) as a favicon: "R" on the
       primary near-black square. Next serves this at /icon and injects the
       <link rel="icon">, which stops browsers' fallback /favicon.ico 404s. -->
  <rect width="64" height="64" rx="14" fill="#1a1a1a"/>
  <text x="32" y="45" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="38" font-weight="700" fill="#fbfbfb">R</text>
</svg>
